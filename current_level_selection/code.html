<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#9e0027",
                        "inverse-on-surface": "#f3f0f0",
                        "tertiary-container": "#3b6d6d",
                        "on-tertiary-fixed": "#002020",
                        "on-primary-fixed-variant": "#920023",
                        "on-secondary-fixed-variant": "#544600",
                        "secondary-container": "#fcd400",
                        "surface-container-low": "#f6f3f2",
                        "on-tertiary-fixed-variant": "#194e4e",
                        "inverse-primary": "#ffb3b4",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#1b1c1c",
                        "secondary-fixed-dim": "#e9c400",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#6e5c00",
                        "surface-container-highest": "#e4e2e1",
                        "on-secondary-fixed": "#221b00",
                        "on-primary-container": "#ffdada",
                        "surface-variant": "#e4e2e1",
                        "on-tertiary-container": "#b8edec",
                        "primary-container": "#c41e3a",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "surface-container": "#f0eded",
                        "background": "#fcf9f8",
                        "inverse-surface": "#303030",
                        "on-error": "#ffffff",
                        "surface-bright": "#fcf9f8",
                        "primary-fixed": "#ffdad9",
                        "surface": "#fcf9f8",
                        "tertiary-fixed": "#b8ecec",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#ba1434",
                        "on-surface-variant": "#5b4040",
                        "tertiary": "#205555",
                        "on-background": "#1b1c1c",
                        "outline": "#8f6f6f",
                        "surface-dim": "#dcd9d9",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#ffe16d",
                        "secondary": "#705d00",
                        "primary-fixed-dim": "#ffb3b4",
                        "on-primary-fixed": "#40000a",
                        "tertiary-fixed-dim": "#9cd0d0",
                        "surface-container-high": "#eae7e7",
                        "outline-variant": "#e3bebd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter-mobile": "16px",
                        "stack-sm": "8px",
                        "margin-mobile": "20px",
                        "unit": "4px",
                        "stack-md": "16px",
                        "stack-lg": "32px",
                        "card-padding": "20px"
                    },
                    "fontFamily": {
                        "display-zh": ["Noto Sans SC"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-zh": ["Noto Sans SC"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "display-zh": ["48px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "600"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-zh": ["20px", {"lineHeight": "32px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 sticky top-0 z-40 bg-background">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:opacity-70">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="text-headline-md-mobile font-headline-md-mobile font-bold text-primary">HSK Chinese Master</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:opacity-70">
<span class="material-symbols-outlined text-primary">settings</span>
</button>
</header>
<main class="flex-grow px-margin-mobile pt-stack-md pb-stack-lg flex flex-col max-w-lg mx-auto w-full">
<!-- Question Section -->
<section class="mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">What is your current level?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Choose the starting point that fits your experience. You can change this later in settings.</p>
</section>
<!-- Bento-style Level Grid -->
<div class="grid grid-cols-1 gap-stack-md mb-stack-lg">
<!-- Beginner Card (Special Highlight) -->
<button class="group flex items-center p-card-padding bg-surface-container-lowest border-2 border-primary rounded-xl text-left shadow-[0_4px_12px_rgba(0,0,0,0.04)] transition-all active:scale-[0.98]">
<div class="w-12 h-12 bg-primary-fixed rounded-full flex items-center justify-center mr-4 text-primary shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">child_care</span>
</div>
<div class="flex-grow">
<h3 class="font-headline-md text-headline-md text-on-surface">Beginner</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">New to the language</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center">
<div class="w-3 h-3 bg-primary rounded-full"></div>
</div>
</button>
<!-- HSK 1 - 3 Grid (Compact) -->
<div class="grid grid-cols-1 gap-stack-md">
<!-- HSK 1 -->
<button class="group flex items-center p-card-padding bg-surface-container-lowest border border-outline-variant rounded-xl text-left hover:border-primary transition-all active:scale-[0.98]">
<div class="w-10 h-10 bg-surface-container-high rounded-lg flex items-center justify-center mr-4 text-primary shrink-0 font-bold">1</div>
<div class="flex-grow">
<h3 class="font-label-md text-label-md text-on-surface">HSK 1</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">150 words</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">check_circle</span>
</button>
<!-- HSK 2 -->
<button class="group flex items-center p-card-padding bg-surface-container-lowest border border-outline-variant rounded-xl text-left hover:border-primary transition-all active:scale-[0.98]">
<div class="w-10 h-10 bg-surface-container-high rounded-lg flex items-center justify-center mr-4 text-primary shrink-0 font-bold">2</div>
<div class="flex-grow">
<h3 class="font-label-md text-label-md text-on-surface">HSK 2</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">300 words</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">check_circle</span>
</button>
<!-- HSK 3 -->
<button class="group flex items-center p-card-padding bg-surface-container-lowest border border-outline-variant rounded-xl text-left hover:border-primary transition-all active:scale-[0.98]">
<div class="w-10 h-10 bg-surface-container-high rounded-lg flex items-center justify-center mr-4 text-primary shrink-0 font-bold">3</div>
<div class="flex-grow">
<h3 class="font-label-md text-label-md text-on-surface">HSK 3</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">600 words</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">check_circle</span>
</button>
<!-- HSK 4 -->
<button class="group flex items-center p-card-padding bg-surface-container-lowest border border-outline-variant rounded-xl text-left hover:border-primary transition-all active:scale-[0.98]">
<div class="w-10 h-10 bg-surface-container-high rounded-lg flex items-center justify-center mr-4 text-primary shrink-0 font-bold">4</div>
<div class="flex-grow">
<h3 class="font-label-md text-label-md text-on-surface">HSK 4</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">1,200 words</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">check_circle</span>
</button>
<!-- HSK 5 -->
<button class="group flex items-center p-card-padding bg-surface-container-lowest border border-outline-variant rounded-xl text-left hover:border-primary transition-all active:scale-[0.98]">
<div class="w-10 h-10 bg-surface-container-high rounded-lg flex items-center justify-center mr-4 text-primary shrink-0 font-bold">5</div>
<div class="flex-grow">
<h3 class="font-label-md text-label-md text-on-surface">HSK 5</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">2,500 words</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">check_circle</span>
</button>
<!-- HSK 6 -->
<button class="group flex items-center p-card-padding bg-surface-container-lowest border border-outline-variant rounded-xl text-left hover:border-primary transition-all active:scale-[0.98]">
<div class="w-10 h-10 bg-surface-container-high rounded-lg flex items-center justify-center mr-4 text-primary shrink-0 font-bold">6</div>
<div class="flex-grow">
<h3 class="font-label-md text-label-md text-on-surface">HSK 6</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">5,000+ words</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary">check_circle</span>
</button>
</div>
</div>
<!-- Sticky Bottom Action -->
<div class="mt-auto pt-6 bg-background">
<button class="w-full bg-primary-container text-on-tertiary font-label-md text-label-md py-4 rounded-xl shadow-[0_6px_16px_rgba(196,30,58,0.15)] hover:bg-primary transition-all active:scale-95">
                Continue
            </button>
</div>
</main>
<!-- BottomNavBar (Hidden on selection screens as per UX mandate for focused journeys) -->
<!-- Suppression logic: Screen is transactional/onboarding flow -->
</body></html>
