<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .chinese-char {
            font-family: 'Noto Sans', sans-serif;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#9e0027",
                        "inverse-on-surface": "#f3f0f0",
                        "tertiary-container": "#3b6d6d",
                        "on-tertiary-fixed": "#002020",
                        "on-primary-fixed-variant": "#920023",
                        "on-secondary-fixed-variant": "#544600",
                        "secondary-container": "#fcd400",
                        "surface-container-low": "#f6f3f2",
                        "on-tertiary-fixed-variant": "#194e4e",
                        "inverse-primary": "#ffb3b4",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#1b1c1c",
                        "secondary-fixed-dim": "#e9c400",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#6e5c00",
                        "surface-container-highest": "#e4e2e1",
                        "on-secondary-fixed": "#221b00",
                        "on-primary-container": "#ffdada",
                        "surface-variant": "#e4e2e1",
                        "on-tertiary-container": "#b8edec",
                        "primary-container": "#c41e3a",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "surface-container": "#f0eded",
                        "background": "#fcf9f8",
                        "inverse-surface": "#303030",
                        "on-error": "#ffffff",
                        "surface-bright": "#fcf9f8",
                        "primary-fixed": "#ffdad9",
                        "surface": "#fcf9f8",
                        "tertiary-fixed": "#b8ecec",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#ba1434",
                        "on-surface-variant": "#5b4040",
                        "tertiary": "#205555",
                        "on-background": "#1b1c1c",
                        "outline": "#8f6f6f",
                        "surface-dim": "#dcd9d9",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#ffe16d",
                        "secondary": "#705d00",
                        "primary-fixed-dim": "#ffb3b4",
                        "on-primary-fixed": "#40000a",
                        "tertiary-fixed-dim": "#9cd0d0",
                        "surface-container-high": "#eae7e7",
                        "outline-variant": "#e3bebd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter-mobile": "16px",
                        "stack-sm": "8px",
                        "margin-mobile": "20px",
                        "unit": "4px",
                        "stack-md": "16px",
                        "stack-lg": "32px",
                        "card-padding": "20px"
                    },
                    "fontFamily": {
                        "display-zh": ["Noto Sans"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-zh": ["Noto Sans"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "display-zh": ["48px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "600"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-zh": ["20px", {"lineHeight": "32px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 sticky top-0 z-40 bg-background">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-md-mobile font-headline-md-mobile font-bold text-primary">Listening Quiz</h1>
</div>
<button class="hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="settings">settings</span>
</button>
</header>
<main class="flex-1 px-margin-mobile pt-stack-lg pb-32 flex flex-col">
<!-- Progress Bar (Internal Logic) -->
<div class="w-full h-1 bg-surface-container-highest rounded-full mb-stack-lg overflow-hidden">
<div class="w-2/3 h-full bg-primary transition-all duration-300"></div>
</div>
<!-- Audio Player Section -->
<div class="flex flex-col items-center justify-center py-stack-lg mb-stack-lg">
<div class="relative group">
<!-- Decorative pulse rings -->
<div class="absolute inset-0 bg-primary/10 rounded-full animate-ping opacity-20"></div>
<button class="relative w-24 h-24 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-lg hover:scale-95 transition-transform active:scale-90">
<span class="material-symbols-outlined !text-[48px]" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<div class="mt-stack-md flex flex-col items-center gap-1">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Tap to Listen</span>
<div class="flex items-center gap-2 bg-surface-container-low px-4 py-1.5 rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-body-md text-primary" data-icon="replay">replay</span>
<span class="font-label-md text-label-md text-on-surface">Replay limit: 1/2</span>
</div>
</div>
</div>
<!-- Question Section -->
<div class="mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-sm">Question</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">What is the speaker's occupation?</p>
</div>
<!-- Options Cluster -->
<div class="space-y-4">
<!-- Option A -->
<button class="w-full flex items-center p-card-padding bg-surface border-2 border-outline-variant rounded-xl hover:border-primary transition-all text-left group">
<span class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:bg-primary group-hover:text-on-primary transition-colors mr-4">A</span>
<span class="font-body-md text-body-md text-on-surface">He is a Chinese teacher.</span>
</button>
<!-- Option B (Selected State Example) -->
<button class="w-full flex items-center p-card-padding bg-surface border-2 border-primary rounded-xl text-left relative overflow-hidden">
<div class="absolute top-0 right-0 p-2">
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="w-10 h-10 rounded-full bg-primary flex items-center justify-center font-label-md text-label-md text-on-primary mr-4 shadow-md shadow-primary/20">B</span>
<span class="font-body-md text-body-md text-on-surface">He is a software engineer.</span>
</button>
<!-- Option C -->
<button class="w-full flex items-center p-card-padding bg-surface border-2 border-outline-variant rounded-xl hover:border-primary transition-all text-left group">
<span class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center font-label-md text-label-md text-on-surface-variant group-hover:bg-primary group-hover:text-on-primary transition-colors mr-4">C</span>
<span class="font-body-md text-body-md text-on-surface">He is a university student.</span>
</button>
</div>
</main>
<!-- Bottom Action Area (Replacing BottomNavBar for focused task) -->
<div class="fixed bottom-0 left-0 right-0 bg-surface p-margin-mobile border-t border-outline-variant flex gap-4 items-center">
<button class="flex-1 py-4 bg-primary text-on-primary font-label-md text-label-md rounded-xl shadow-lg shadow-primary/15 hover:opacity-90 active:scale-[0.98] transition-all">
            SUBMIT
        </button>
</div>
<!-- Hidden BottomNavBar Structure (Suppressed as per "Task-Focused" rule but defined for layout consistency) -->
<!-- On focused quiz screen, navigation is hidden to minimize distraction -->
</body></html>
