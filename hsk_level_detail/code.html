<!DOCTYPE html>

<html lang="zh-Hans"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;700&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {

          extend: {
            "colors": {
                    "primary": "#9e0027",
                    "inverse-on-surface": "#f3f0f0",
                    "tertiary-container": "#3b6d6d",
                    "on-tertiary-fixed": "#002020",

                    "on-secondary-fixed-variant": "#544600",

                    "on-tertiary-fixed-variant": "#194e4e",
                    "inverse-primary": "#ffb3b4",

                    "on-surface": "#1b1c1c",
                    "secondary-fixed-dim": "#e9c400",
                    "surface-container-lowest": "#ffffff",
                    "on-error-container": "#93000a",
                    "on-secondary-container": "#6e5c00",
                    "surface-container-highest": "#e4e2e1",
                    "on-secondary-fixed": "#221b00",
                    "on-primary-container": "#ffdada",
                    "surface-variant": "#e4e2e1",
                    "on-tertiary-container": "#b8edec",
                    "primary-container": "#c41e3a",
                    "error-container": "#ffdad6",
                    "error": "#ba1a1a",
                    "surface-container": "#f0eded",
                    "background": "#fcf9f8",
                    "inverse-surface": "#303030",
                    "on-error": "#ffffff",
                    "surface-bright": "#fcf9f8",

                    "surface-dim": "#dcd9d9",

            "borderRadius": {
                    "DEFAULT": "0.25rem",

                    "full": "9999px"
            },
            "spacing": {
                    "gutter-mobile": "16px",
                    "stack-sm": "8px",
                    "margin-mobile": "20px",
                    "unit": "4px",
                    "stack-md": "16px",
                    "stack-lg": "32px",
                    "card-padding": "20px"
            },
            "fontFamily": {
                    "display-zh": ["Noto Sans SC"],
                    "label-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-zh": ["Noto Sans SC"],
                    "body-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "headline-lg-mobile": ["Inter"]
            },
            "fontSize": {
                    "display-zh": ["48px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "600"}],

                    "body-zh": ["20px", {"lineHeight": "32px", "fontWeight": "400"}],

                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]

          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .card-shadow {
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.04);
        }
        .primary-shadow {
            box-shadow: 0px 6px 16px rgba(196, 30, 58, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 sticky top-0 z-40 bg-background">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="text-headline-md-mobile font-headline-md-mobile font-bold text-primary">HSK 1</h1>
</div>
<button class="flex items-center justify-center p-2 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface">settings</span>
</button>
</header>
<main class="px-margin-mobile space-y-stack-lg mt-4">
<!-- Hero Image Section (Bento Style) -->
<div class="relative h-48 w-full rounded-xl overflow-hidden mb-stack-lg">
<img class="w-full h-full object-cover" data-alt="A serene and minimalist study space representing Chinese culture. A white ceramic tea set sits on a light wood table next to a calligraphy brush and paper. Soft morning sunlight filters through a bamboo screen, creating a calm productivity mood. The color palette is composed of soft whites, warm wood tones, and subtle red accents, reflecting a modern corporate academic aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDdOpGgtJMfhg6_xXF3IiNu7rRWYp3YavriEdUyzBaWlFn7RU4m3GM3gRhazLWZ9Mve6oiG7Yc0-eyltWyXIXfgQDXlP-XcqH32Bq7W45KCZWHJmiasU4q-LBUk8VzI3kgaMsK07lxh2QSWx5sNcjSGizuR3ciLdiAjPBRtUaO-k2Ce_JoBXfFefAZqSlYZwbB_tw52qFzEqCsw_-FYZCsktIJtUDUoBUZM3LVLXMAR0UEFKaHu6TYI4IatWqxf7qQ--5UOqQpocB4"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
<div class="absolute bottom-4 left-4 text-white">
<span class="bg-primary px-3 py-1 rounded-full text-label-sm font-label-sm">Beginner</span>
<h2 class="text-headline-lg-mobile font-headline-lg-mobile mt-2">Level 1 Mastery</h2>
</div>
</div>
<!-- Overview Section: Tonal Layering -->
<section class="grid grid-cols-3 gap-stack-sm">
<div class="bg-surface-container-lowest p-card-padding rounded-xl card-shadow text-center flex flex-col items-center">
<span class="text-headline-md font-headline-md text-primary">150</span>
<span class="text-label-sm font-label-sm text-on-surface-variant">Words</span>
</div>
<div class="bg-surface-container-lowest p-card-padding rounded-xl card-shadow text-center flex flex-col items-center border-b-4 border-primary/10">
<span class="text-headline-md font-headline-md text-primary">30</span>
<span class="text-label-sm font-label-sm text-on-surface-variant">Grammar</span>
</div>
<div class="bg-surface-container-lowest p-card-padding rounded-xl card-shadow text-center flex flex-col items-center">
<span class="text-headline-md font-headline-md text-primary">20</span>
<span class="text-label-sm font-label-sm text-on-surface-variant">Lessons</span>
</div>
</section>
<!-- Path-based Flow Sections -->
<section class="space-y-stack-md">
<h3 class="text-label-sm font-label-sm text-outline tracking-widest uppercase">Learning Modules</h3>
<!-- Asymmetric/Premium Grid Layout -->
<div class="grid grid-cols-2 gap-stack-md">
<!-- Vocabulary Card -->
<div class="bg-surface-container-lowest p-card-padding rounded-xl card-shadow flex flex-col justify-between aspect-square group hover:bg-primary transition-colors duration-300">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-white">menu_book</span>
</div>
<div>
<h4 class="text-headline-md font-headline-md group-hover:text-white">Vocabulary</h4>
<p class="text-label-sm font-label-sm text-on-surface-variant group-hover:text-white/80">Flashcards &amp; Pronunciation</p>
</div>
</div>
<!-- Grammar Card -->
<div class="bg-surface-container-lowest p-card-padding rounded-xl card-shadow flex flex-col justify-between aspect-square group hover:bg-primary transition-colors duration-300">
<div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-primary group-hover:text-white">schema</span>
</div>
<div>
<h4 class="text-headline-md font-headline-md group-hover:text-white">Grammar</h4>
<p class="text-label-sm font-label-sm text-on-surface-variant group-hover:text-white/80">30 Core Structures</p>
</div>
</div>
<!-- Full Width Lessons -->
<div class="col-span-2 bg-surface-container-lowest p-card-padding rounded-xl card-shadow flex items-center gap-4 group">
<div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">school</span>
</div>
<div class="flex-1">
<h4 class="text-headline-md font-headline-md">Lessons</h4>
<p class="text-label-sm font-label-sm text-on-surface-variant">Step-by-step curriculum</p>
</div>
<span class="material-symbols-outlined text-outline group-hover:text-primary transition-colors">chevron_right</span>
</div>
<!-- Practice & Mock Test Half Width -->
<div class="bg-surface-container-lowest p-card-padding rounded-xl card-shadow flex flex-col items-center text-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">fitness_center</span>
<h4 class="text-label-md font-label-md">Practice</h4>
</div>
<div class="bg-surface-container-lowest p-card-padding rounded-xl card-shadow flex flex-col items-center text-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">assignment</span>
<h4 class="text-label-md font-label-md">Mock Test</h4>
</div>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-gradient-to-t from-background via-background/95 to-transparent z-50">
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-headline-md primary-shadow flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-weight="fill">play_arrow</span>
            Start learning
        </button>
</div>
</body></html>
