<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Top Navigation Bar -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 sticky top-0 z-40 bg-background">
<button class="flex items-center justify-center w-10 h-10 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<span class="text-headline-md-mobile font-headline-md-mobile font-bold text-primary">HSK Chinese Master</span>
<div class="w-10"></div> <!-- Placeholder for symmetry -->
</header>
<main class="flex-grow flex flex-col px-margin-mobile pb-stack-lg">
<!-- Header Section -->
<section class="mt-stack-md text-center">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface mb-stack-sm">Prepare for HSK exams</h1>
<p class="text-body-md font-body-md text-on-surface-variant max-w-[280px] mx-auto">Follow structured lessons and practice real exam-style questions</p>
</section>
<!-- Learning Path Visualization (Bento-style layout for the path) -->
<section class="flex-grow flex items-center justify-center py-stack-lg relative">
<div class="relative w-full max-w-xs flex flex-col items-center">
<!-- Vertical Dotted Path Line -->
<div class="absolute top-10 bottom-10 left-1/2 -translate-x-1/2 w-0.5 border-l-2 border-dashed border-outline-variant"></div>
<!-- Path Milestones -->
<div class="space-y-12 w-full relative z-10">
<!-- HSK 6 (Target) -->
<div class="flex items-center justify-end w-full pr-1/2">
<div class="flex items-center gap-stack-sm translate-x-10">
<div class="flex flex-col items-end">
<span class="text-label-sm font-label-sm text-outline">Target</span>
<span class="text-headline-md font-headline-md text-on-surface">HSK 6</span>
</div>
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center border-2 border-white card-shadow">
<span class="material-symbols-outlined text-outline" data-icon="school">school</span>
</div>
</div>
</div>
<!-- HSK 4-5 -->
<div class="flex items-center justify-start w-full">
<div class="flex items-center gap-stack-sm -translate-x-4">
<div class="w-14 h-14 rounded-full bg-white flex items-center justify-center border-2 border-primary card-shadow">
<span class="material-symbols-outlined text-primary" data-icon="menu_book">menu_book</span>
</div>
<div class="flex flex-col">
<span class="text-label-sm font-label-sm text-primary">Advanced</span>
<span class="text-headline-md font-headline-md text-on-surface">HSK 4-5</span>
</div>
</div>
</div>
<!-- HSK 2-3 (Active State) -->
<div class="flex items-center justify-end w-full">
<div class="flex items-center gap-stack-sm translate-x-4">
<div class="flex flex-col items-end">
<span class="text-label-sm font-label-sm text-primary-container">Current Path</span>
<span class="text-headline-md font-headline-md text-on-surface">HSK 2-3</span>
</div>
<div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center border-4 border-primary-fixed card-shadow">
<span class="material-symbols-outlined text-on-primary" data-icon="fitness_center" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
</div>
</div>
<!-- HSK 1 -->
<div class="flex items-center justify-start w-full">
<div class="flex items-center gap-stack-sm -translate-x-2">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center border-2 border-white card-shadow">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="history_edu">history_edu</span>
</div>
<div class="flex flex-col">
<span class="text-label-sm font-label-sm text-on-surface-variant">Foundation</span>
<span class="text-headline-md font-headline-md text-on-surface">HSK 1</span>
</div>
</div>
</div>
</div>

<div class="h-1.5 w-6 rounded-full bg-surface-container-highest"></div>
<div class="h-1.5 w-10 rounded-full bg-primary"></div>
<div class="h-1.5 w-6 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Primary Action -->
<div class="flex flex-col gap-stack-md">
<button class="w-full h-14 bg-primary text-on-primary font-label-md text-label-md rounded-xl card-shadow hover:brightness-110 active:scale-95 transition-all">
                    Next
                </button>
</div>
</footer>
