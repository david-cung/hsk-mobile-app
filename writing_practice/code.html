<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Noto+Sans:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "primary": "#9e0027",
                  "inverse-on-surface": "#f3f0f0",
                  "tertiary-container": "#3b6d6d",
                  "on-tertiary-fixed": "#002020",
                  "on-primary-fixed-variant": "#920023",
                  "on-secondary-fixed-variant": "#544600",
                  "secondary-container": "#fcd400",
                  "surface-container-low": "#f6f3f2",
                  "on-tertiary-fixed-variant": "#194e4e",
                  "inverse-primary": "#ffb3b4",
                  "on-tertiary": "#ffffff",
                  "on-surface": "#1b1c1c",
                  "secondary-fixed-dim": "#e9c400",
                  "surface-container-lowest": "#ffffff",
                  "on-error-container": "#93000a",
                  "on-secondary-container": "#6e5c00",
                  "surface-container-highest": "#e4e2e1",
                  "on-secondary-fixed": "#221b00",
                  "on-primary-container": "#ffdada",
                  "surface-variant": "#e4e2e1",
                  "on-tertiary-container": "#b8edec",
                  "primary-container": "#c41e3a",
                  "error-container": "#ffdad6",
                  "error": "#ba1a1a",
                  "surface-container": "#f0eded",
                  "background": "#fcf9f8",
                  "inverse-surface": "#303030",
                  "on-error": "#ffffff",
                  "surface-bright": "#fcf9f8",
                  "primary-fixed": "#ffdad9",
                  "surface": "#fcf9f8",
                  "tertiary-fixed": "#b8ecec",
                  "on-secondary": "#ffffff",
                  "surface-tint": "#ba1434",
                  "on-surface-variant": "#5b4040",
                  "tertiary": "#205555",
                  "on-background": "#1b1c1c",
                  "outline": "#8f6f6f",
                  "surface-dim": "#dcd9d9",
                  "on-primary": "#ffffff",
                  "secondary-fixed": "#ffe16d",
                  "secondary": "#705d00",
                  "primary-fixed-dim": "#ffb3b4",
                  "on-primary-fixed": "#40000a",
                  "tertiary-fixed-dim": "#9cd0d0",
                  "surface-container-high": "#eae7e7",
                  "outline-variant": "#e3bebd"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "gutter-mobile": "16px",
                  "stack-sm": "8px",
                  "margin-mobile": "20px",
                  "unit": "4px",
                  "stack-md": "16px",
                  "stack-lg": "32px",
                  "card-padding": "20px"
          },
          "fontFamily": {
                  "display-zh": ["Noto Sans"],
                  "label-md": ["Inter"],
                  "body-lg": ["Inter"],
                  "label-sm": ["Inter"],
                  "headline-md": ["Inter"],
                  "body-zh": ["Noto Sans"],
                  "body-md": ["Inter"],
                  "headline-lg": ["Inter"],
                  "headline-lg-mobile": ["Inter"]
          },
          "fontSize": {
                  "display-zh": ["48px", {"lineHeight": "1.2", "fontWeight": "700"}],
                  "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                  "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                  "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.04em", "fontWeight": "600"}],
                  "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                  "body-zh": ["20px", {"lineHeight": "32px", "fontWeight": "400"}],
                  "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                  "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                  "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    .chinese-grid {
      background-image: 
        linear-gradient(to right, #e3bebd 1px, transparent 1px),
        linear-gradient(to bottom, #e3bebd 1px, transparent 1px),
        linear-gradient(45deg, transparent 48%, #e3bebd 49%, #e3bebd 51%, transparent 52%),
        linear-gradient(-45deg, transparent 48%, #e3bebd 49%, #e3bebd 51%, transparent 52%);
      background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
    }
    .writing-canvas {
      background-image: 
        linear-gradient(to right, #f0eded 1px, transparent 1px),
        linear-gradient(to bottom, #f0eded 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 sticky top-0 z-40 bg-background dark:bg-background">
<button class="text-primary hover:opacity-80 transition-opacity flex items-center justify-center h-11 w-11 rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-headline-md-mobile font-headline-md-mobile font-bold text-primary dark:text-inverse-primary">HSK Chinese Master</h1>
<button class="text-primary hover:opacity-80 transition-opacity flex items-center justify-center h-11 w-11 rounded-full">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<main class="flex-1 px-margin-mobile pb-stack-lg overflow-y-auto">
<!-- Instruction Prompt -->
<div class="mt-4 mb-stack-md text-center">
<p class="text-on-surface-variant font-label-md text-label-md uppercase tracking-wider mb-1">Writing Practice</p>
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface">Write the character for "Study"</h2>
</div>
<!-- Character Guide Card -->
<div class="bg-surface-container-lowest rounded-xl p-card-padding shadow-[0_4px_12px_rgba(0,0,0,0.04)] mb-stack-md flex flex-col items-center border border-outline-variant/30">
<div class="relative w-48 h-48 chinese-grid border-2 border-primary/20 flex items-center justify-center rounded-lg">
<span class="text-[120px] font-display-zh text-primary opacity-20 select-none">学</span>
<!-- Stroke Order Simulation Overlay -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<!-- Simplified stroke representation for UI demonstration -->
<div class="w-full h-full relative">
<span class="absolute top-4 left-1/2 -translate-x-1/2 bg-primary text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">1</span>
<span class="absolute top-8 left-[35%] bg-primary text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">2</span>
<span class="absolute top-8 right-[35%] bg-primary text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">3</span>
<span class="absolute top-[45%] left-1/4 bg-primary text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">4</span>
<span class="absolute bottom-[20%] left-1/2 -translate-x-1/2 bg-primary text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">8</span>
</div>
</div>
</div>
<div class="mt-4 flex gap-4 w-full justify-center">
<div class="text-center">
<p class="text-label-sm font-label-sm text-on-surface-variant">Pinyin</p>
<p class="text-body-lg font-body-lg font-bold text-on-surface">xué</p>
</div>
<div class="w-px h-8 bg-outline-variant"></div>
<div class="text-center">
<p class="text-label-sm font-label-sm text-on-surface-variant">Strokes</p>
<p class="text-body-lg font-body-lg font-bold text-on-surface">8</p>
</div>
</div>
</div>
<!-- Practice Canvas -->
<div class="relative bg-white rounded-xl aspect-square w-full shadow-[0_4px_12px_rgba(0,0,0,0.04)] border border-outline-variant overflow-hidden writing-canvas">
<!-- Toolbar for canvas -->
<div class="absolute top-3 right-3 flex flex-col gap-2 z-10">
<button class="bg-surface-container-high w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-outline-variant transition-colors">
<span class="material-symbols-outlined">undo</span>
</button>
<button class="bg-surface-container-high w-10 h-10 rounded-full flex items-center justify-center text-on-surface-variant hover:bg-outline-variant transition-colors">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<!-- Visual Hint (Dashed center lines for the writing area) -->
<div class="absolute inset-0 pointer-events-none border-dashed border-outline-variant/40 border-l border-t" style="background-image: linear-gradient(to right, transparent 49.5%, #e3bebd 49.5%, #e3bebd 50.5%, transparent 50.5%), linear-gradient(to bottom, transparent 49.5%, #e3bebd 49.5%, #e3bebd 50.5%, transparent 50.5%);"></div>
<!-- Interaction cue -->
<div class="absolute inset-0 flex flex-col items-center justify-center text-outline opacity-40 select-none">
<span class="material-symbols-outlined text-4xl mb-2">draw</span>
<p class="text-label-sm font-label-sm">Draw here</p>
</div>
</div>
<!-- Submit Action -->
<div class="mt-stack-lg">
<button class="w-full bg-primary text-on-primary py-4 rounded-full font-bold text-body-lg shadow-[0_6px_16px_rgba(158,0,39,0.15)] active:scale-95 transition-transform hover:brightness-110 flex items-center justify-center gap-2">
<span>Submit Practice</span>
<span class="material-symbols-outlined">check_circle</span>
</button>
<button class="w-full mt-4 text-primary font-bold text-label-md py-2 hover:bg-primary/5 rounded-lg transition-colors">
        See Stroke Guide
      </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full flex justify-around items-center px-gutter-mobile py-2 bg-surface dark:bg-surface-dim border-t border-outline-variant z-50">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:text-primary transition-colors duration-200" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-label-sm font-label-sm mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:text-primary transition-colors duration-200" href="#">
<span class="material-symbols-outlined">menu_book</span>
<span class="text-label-sm font-label-sm mt-1">Learn</span>
</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-inverse-primary font-bold after:content-[''] after:w-1 after:h-1 after:bg-primary after:rounded-full after:mt-1 active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">fitness_center</span>
<span class="text-label-sm font-label-sm">Practice</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:text-primary transition-colors duration-200" href="#">
<span class="material-symbols-outlined">leaderboard</span>
<span class="text-label-sm font-label-sm mt-1">Progress</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:text-primary transition-colors duration-200" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-label-sm font-label-sm mt-1">Profile</span>
</a>
</nav>
</body></html>
