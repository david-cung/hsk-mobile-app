<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 sticky top-0 z-40 bg-background dark:bg-background">
<button class="text-primary hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-md-mobile font-headline-md-mobile font-bold text-primary dark:text-inverse-primary">HSK Chinese Master</h1>
<button class="text-primary hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<main class="flex-grow flex flex-col px-margin-mobile">
<!-- Progress Indicator Section -->
<div class="mt-stack-md flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<span class="text-label-sm font-label-sm text-on-surface-variant">Review Progress</span>
<span class="text-label-sm font-label-sm text-primary font-bold">12 / 20</span>
</div>
<div class="w-full h-2 bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-primary w-[60%] rounded-full"></div>
</div>
</div>
<!-- Content Canvas -->
<div class="flex-grow flex flex-col justify-center items-center py-stack-lg">
<!-- Flashcard Container -->
<div class="w-full max-w-sm aspect-[3/4] bg-surface-container-lowest rounded-xl flashcard-shadow p-card-padding flex flex-col items-center justify-center relative cursor-pointer border border-outline-variant/10 group transition-all duration-300 hover:scale-[1.01]">
<!-- Card Header Info -->
<div class="absolute top-6 left-6 flex gap-2">
<span class="px-2 py-0.5 bg-tertiary-container/10 text-tertiary-container text-label-sm font-label-sm rounded border border-tertiary-container/20">HSK 1</span>
<span class="px-2 py-0.5 bg-secondary-container/20 text-secondary text-label-sm font-label-sm rounded border border-secondary-container/30">Nouns</span>
</div>
<div class="absolute top-6 right-6">
<span class="material-symbols-outlined text-on-surface-variant/40" data-icon="volume_up">volume_up</span>
</div>
<!-- Main Content: Front of Card -->
<div class="flex flex-col items-center">
<span class="text-[80px] leading-tight font-display-zh text-on-surface chinese-char tracking-widest">学生</span>
<!-- Hidden Reveal Area (Revealed on Tap) -->
<div class="mt-8 flex flex-col items-center gap-2">
<p class="text-headline-md font-headline-md text-primary tracking-wide">xué sheng</p>
<p class="text-body-lg font-body-lg text-on-surface-variant">student</p>
</div>
</div>
<!-- Tap Instruction -->
<div class="absolute bottom-6 w-full text-center">
<p class="text-label-sm font-label-sm text-outline uppercase tracking-widest opacity-60">Tap to Flip</p>
</div>
</div>
<!-- Spaced Repetition Feedback Buttons -->
<div class="w-full max-w-sm mt-stack-lg grid grid-cols-2 sm:grid-cols-4 gap-3">
<!-- Forgot Button -->
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl bg-surface border border-outline-variant hover:bg-error-container/10 transition-colors group">
<span class="text-label-sm font-label-sm text-error mb-1">Forgot</span>
<span class="text-[10px] text-outline font-medium">&lt; 1m</span>
</button>
<!-- Hard Button -->
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl bg-surface border border-outline-variant hover:bg-surface-container-high transition-colors">
<span class="text-label-sm font-label-sm text-on-surface-variant mb-1">Hard</span>
<span class="text-[10px] text-outline font-medium">2d</span>
</button>
<!-- Good Button -->
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl bg-surface border-2 border-primary/20 hover:border-primary transition-colors">
<span class="text-label-sm font-label-sm text-primary mb-1">Good</span>
<span class="text-[10px] text-outline font-medium">4d</span>
</button>
<!-- Easy Button -->
<button class="flex flex-col items-center justify-center py-4 px-2 rounded-xl bg-surface border border-outline-variant hover:bg-tertiary-container/10 transition-colors">
<span class="text-label-sm font-label-sm text-tertiary-container mb-1">Easy</span>
<span class="text-[10px] text-outline font-medium">7d</span>
</button>
</div>
</div>

<span class="text-label-sm font-label-sm">Learn</span>

<span class="text-label-sm font-label-sm">Progress</span>

<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-label-sm font-label-sm">Profile</span>
</a>
