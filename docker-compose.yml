services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hsk
      POSTGRES_PASSWORD: hsk_secret
      POSTGRES_DB: hsk_master
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsk -d hsk_master"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://hsk:hsk_secret@db:5432/hsk_master
      SECRET_KEY: dev-secret-change-in-production
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
