<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md text-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 sticky top-0 z-40 bg-background">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary cursor-pointer" data-icon="arrow_back">arrow_back</span>
<h1 class="text-headline-md-mobile font-headline-md-mobile font-bold text-primary">HSK Chinese Master</h1>
</div>
<div class="flex items-center gap-3">
<div class="flex items-center bg-surface-container-high px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[18px] text-primary mr-1" data-icon="schedule">schedule</span>
<span class="text-label-sm font-label-sm text-on-surface">12:45</span>
</div>
<span class="material-symbols-outlined text-on-surface cursor-pointer" data-icon="settings">settings</span>
</div>
</header>
<main class="flex-1 px-margin-mobile flex flex-col pt-4 pb-32 max-w-lg mx-auto w-full">
<!-- Progress Indicator -->
<div class="mb-stack-lg">
<div class="flex justify-between items-end mb-2">
<span class="text-label-md font-label-md text-on-surface-variant">Step 4 of 10</span>
<span class="text-label-md font-label-md text-primary font-bold">40%</span>
</div>
<div class="h-2 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary-container w-[40%] rounded-full"></div>
</div>
</div>
<!-- Question Section -->
<div class="bg-white p-card-padding rounded-xl shadow-custom mb-stack-lg border border-outline-variant/30 text-center">
<p class="text-label-sm font-label-sm text-primary mb-2 tracking-widest uppercase">Pinyin Challenge</p>
<h2 class="text-display-zh font-display-zh text-on-surface mb-4">学生</h2>
<p class="text-body-lg font-body-lg text-on-surface-variant">Which of the following is the pinyin for the characters above?</p>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 gap-stack-md">
<!-- Option 1: Selected/Active -->
<button class="flex items-center justify-between p-card-padding bg-white border-2 border-primary rounded-xl shadow-active text-left transition-all duration-200 transform scale-[0.98]">
<div class="flex items-center gap-4">
<span class="w-8 h-8 flex items-center justify-center rounded-full bg-primary text-white font-bold text-label-md">A</span>
<span class="text-body-zh font-body-zh text-primary font-bold">xué sheng</span>
</div>
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option 2 -->
<button class="flex items-center justify-between p-card-padding bg-white border border-outline-variant rounded-xl shadow-custom text-left hover:border-primary/50 transition-colors duration-200">
<div class="flex items-center gap-4">
<span class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container text-on-surface-variant font-bold text-label-md">B</span>
<span class="text-body-zh font-body-zh text-on-surface">xué xi</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
<!-- Option 3 -->
<button class="flex items-center justify-between p-card-padding bg-white border border-outline-variant rounded-xl shadow-custom text-left hover:border-primary/50 transition-colors duration-200">
<div class="flex items-center gap-4">
<span class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container text-on-surface-variant font-bold text-label-md">C</span>
<span class="text-body-zh font-body-zh text-on-surface">lǎo shī</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
<!-- Option 4 -->
<button class="flex items-center justify-between p-card-padding bg-white border border-outline-variant rounded-xl shadow-custom text-left hover:border-primary/50 transition-colors duration-200">
<div class="flex items-center gap-4">
<span class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container text-on-surface-variant font-bold text-label-md">D</span>
<span class="text-body-zh font-body-zh text-on-surface">tóng xué</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
</div>
<!-- Instructional Tip -->
<div class="mt-stack-lg flex items-start gap-3 p-4 bg-tertiary-fixed/30 rounded-lg border border-tertiary-fixed">
<span class="material-symbols-outlined text-tertiary" data-icon="lightbulb">lightbulb</span>
<p class="text-label-sm font-label-sm text-tertiary-container leading-relaxed">
                Hint: Focus on the second character '生'. It often has a neutral tone in this specific combination.
            </p>
</div>
</main>

<div class="fixed bottom-0 w-full p-margin-mobile bg-surface-container-lowest border-t border-outline-variant flex flex-col gap-3 z-50">

</button>
</div>

<div class="fixed top-24 -right-12 opacity-[0.03] pointer-events-none select-none">
<span class="text-[200px] font-bold">学</span>
