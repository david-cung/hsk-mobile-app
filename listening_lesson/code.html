<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HSK Chinese Master - Listening Lesson</title>

              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter-mobile": "16px",
                      "stack-sm": "8px",
                      "margin-mobile": "20px",
                      "unit": "4px",
                      "stack-md": "16px",
                      "stack-lg": "32px",
                      "card-padding": "20px"

              "fontFamily": {

                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-margin-mobile py-4 sticky top-0 z-40 bg-background">
<button class="hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-headline-md-mobile font-headline-md-mobile font-bold text-primary">HSK Chinese Master</h1>
<button class="hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-on-surface" data-icon="settings">settings</span>
</button>
</header>
<main class="flex-grow px-margin-mobile pb-32">
<!-- Progress Bar -->
<div class="w-full bg-surface-container-highest h-2 rounded-full mt-2 mb-8 overflow-hidden">
<div class="bg-secondary h-full rounded-full" style="width: 65%;"></div>
</div>
<!-- Audio Player Section -->
<section class="bg-surface-container-lowest rounded-xl p-card-padding shadow-sm mb-stack-lg border border-surface-container-high">
<div class="flex flex-col items-center">
<!-- Visualizer -->
<div class="w-full h-32 flex items-center justify-center gap-1 mb-stack-lg">
<div class="w-1.5 h-12 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-16 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-20 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-24 bg-primary rounded-full"></div>
<div class="w-1.5 h-28 bg-primary rounded-full"></div>
<div class="w-1.5 h-24 bg-primary rounded-full"></div>
<div class="w-1.5 h-20 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-24 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-16 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-12 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-8 bg-primary-fixed-dim rounded-full"></div>
<div class="w-1.5 h-14 bg-primary-fixed-dim rounded-full"></div>
</div>
<!-- Controls -->
<div class="flex items-center gap-stack-lg mb-stack-md">
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="replay_10">replay_10</span>
</button>
<button class="w-16 h-16 bg-primary rounded-full flex items-center justify-center text-on-primary shadow-lg hover:opacity-90 active:scale-95 transition-all">
<span class="material-symbols-outlined text-4xl" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button class="p-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="forward_10">forward_10</span>
</button>
</div>
<!-- Transcript Toggle -->
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded-full hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="description">description</span>
<span class="font-label-md text-label-md">Transcript</span>
</button>
</div>
</section>
<!-- Question Section -->
<section class="mb-stack-lg">
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-md">Where is the speaker going?</h2>
<div class="space-y-stack-md">
<!-- Option A -->
<label class="flex items-center p-card-padding bg-surface-container-lowest border-2 border-surface-container-high rounded-xl cursor-pointer hover:border-primary-fixed transition-all group active:scale-[0.98]">
<input class="hidden peer" name="listening-option" type="radio"/>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant mr-4 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-colors">
<div class="w-2 h-2 bg-on-primary rounded-full opacity-0 peer-checked:opacity-100"></div>
</div>
<span class="font-body-md text-on-surface group-hover:text-primary transition-colors">To the library (图书馆)</span>
</label>
<!-- Option B -->
<label class="flex items-center p-card-padding bg-surface-container-lowest border-2 border-surface-container-high rounded-xl cursor-pointer hover:border-primary-fixed transition-all group active:scale-[0.98]">
<input class="hidden peer" name="listening-option" type="radio"/>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant mr-4 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-colors">
<div class="w-2 h-2 bg-on-primary rounded-full opacity-0 peer-checked:opacity-100"></div>
</div>
<span class="font-body-md text-on-surface group-hover:text-primary transition-colors">To the supermarket (超市)</span>
</label>
<!-- Option C -->
<label class="flex items-center p-card-padding bg-surface-container-lowest border-2 border-surface-container-high rounded-xl cursor-pointer hover:border-primary-fixed transition-all group active:scale-[0.98]">
<input class="hidden peer" name="listening-option" type="radio"/>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant mr-4 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center transition-colors">
<div class="w-2 h-2 bg-on-primary rounded-full opacity-0 peer-checked:opacity-100"></div>
</div>
<span class="font-body-md text-on-surface group-hover:text-primary transition-colors">To a friend's house (朋友家)</span>
</label>
</div>
</section>
</main>
<!-- Bottom Action Button -->
<div class="fixed bottom-0 w-full p-margin-mobile bg-background z-30">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-xl shadow-lg hover:opacity-90 active:scale-95 transition-all uppercase tracking-wider">
            Check answer
        </button>
</div>
<!-- BottomNavBar (Hidden on transactional screen as per logic) -->
<nav class="fixed bottom-0 w-full flex justify-around items-center px-gutter-mobile py-2 bg-surface border-t border-outline-variant hidden">
<div class="flex flex-col items-center justify-center text-primary font-bold after:content-[''] after:w-1 after:h-1 after:bg-primary after:rounded-full after:mt-1 scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="text-label-sm font-label-sm">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="text-label-sm font-label-sm">Learn</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="fitness_center">fitness_center</span>
<span class="text-label-sm font-label-sm">Practice</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="text-label-sm font-label-sm">Progress</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors duration-200">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-label-sm font-label-sm">Profile</span>
</div>
</nav>
</body></html>
